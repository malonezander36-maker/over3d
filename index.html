<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAINROT HUB | GOATED</title>
    <style>
        :root {
            --neon-green: #00ff00;
            --neon-pink: #ff00ff;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            overflow-x: hidden;
            text-align: center;
        }

        /* Animated Title */
        .header {
            padding: 40px;
            background: linear-gradient(45deg, #1a1a1a, #000);
            border-bottom: 5px solid var(--neon-green);
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            animation: shake 0.5s infinite;
            text-shadow: 4px 4px var(--neon-pink);
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            50% { transform: translate(-1px, 2px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* Aura Counter */
        #aura-display {
            font-size: 2rem;
            color: var(--neon-green);
            margin: 20px 0;
            cursor: pointer;
            user-select: none;
        }

        /* Game Grid */
        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            padding: 40px;
        }

        .card {
            width: 300px;
            background: #111;
            border: 3px solid #333;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-content { padding: 20px; }

        .play-btn {
            display: block;
            background: var(--neon-green);
            color: black;
            padding: 15px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            margin-top: 10px;
        }

        /* Soundboard */
        .soundboard {
            background: #111;
            padding: 30px;
            border-top: 5px solid var(--neon-pink);
        }

        .sfx-btn {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
        }

        .sfx-btn:active { background: var(--neon-pink); }
    </style>
</head>
